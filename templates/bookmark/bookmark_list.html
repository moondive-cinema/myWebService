{% extends "base.html" %}
{% load static %}

{% block title %} My Bookmark List{% endblock %}

{% block content %}
    <h1>Bookmark List</h1>
    <ul>
        {% for bookmark in object_list %} 
            <li> <a href="{% url 'bookmark:detail' bookmark.pk %}">{{ bookmark.title }}</a></li>
        {% endfor %}
    </ul>
{% endblock content %}
