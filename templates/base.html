<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title> {% block title %} Django Web Programming {% endblock %} </title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet">
        {% block extra-style %}
        {% endblock %}
    </head>

    <body style="padding-top:90px;">

        <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
            <div class="container-fluid">
                
                <span class="navbar-brand mx-5 mb-0 font-weight-bold" href="#">HELLO DJANGO!</span>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav mr-auto">
                        <li class="nav-item mx-1 btn">
                            <a class="nav-link active" href="{% url "home" %}">Home</a>
                        </li>
                        <li class="nav-item mx-1 btn">
                            <a class="nav-link" href="{% url "bookmark:index" %}">Bookmark</a>
                        </li>
                        <li class="nav-item mx-1 btn">
                            <a class="nav-link" href="{% url "blog:index" %}">Blog</a>
                        </li>
                        <li class="nav-item mx-1 btn">
                            <a class="nav-link" href="#" %}">Photo</a>
                        </li>
                        <li class="nav-item dropdown mx-1 btn">
                            <a class="nav-link dropdown-toggle" href="#" ole="button" data-bs-toggle="dropdown">Util</a>
                            <div class="dropdown-menu">
                                <a class="dropdown-item" href="{% url "blog:post_archive" %}">Archive</a>
                                <a class="dropdown-item" href="#">Search</a>
                                <div class="dropdown-divider"></div>
                                <a class="dropdown-item" href="{% url "admin:index" %}">Admin</a>
                            </div>
                        </li>
                    </ul>
                    <form class="form-inline my-2" action="" method="post"> {% csrf_token %}
                        <input class="form-control mr-sm-2" type="search" placeholder="Search">
                    </form>
                </div>
            </div>
        </nav>       

        <div class="container">
            {% block content %}
            {% endblock %}
        </div>

        <footer class="fixed-bottom">
            {% block footer %}
            {% endblock %}
        </footer>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://kit.fontawesome.com/c53b730126.js"></script>
        {% block extra-script %} 
        {% endblock %}
    </body>
</html>
